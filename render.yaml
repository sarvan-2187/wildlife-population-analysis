services:
  - type: web
    name: ecodynamix-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FRONTEND_URL
        value: https://ecodynamix-dashboard.vercel.app
      # Add GROQ_API_KEY in your Render dashboard
